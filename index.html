<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster Party Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= MAIN MENU ================= -->

<div id="menu" class="view active main-menu">

    <h1>Hitster Party Game</h1>
    <p>Errate Titel, Interpret und Erscheinungsjahr</p>

    <button class="menu-button" onclick="startGame()">🎮 Neues Spiel</button>
    <button class="menu-button" onclick="openDatabase()">💿 Datenbank</button>

</div>

<!-- ================= GAME ================= -->

<div id="game" class="view">

    <div class="top-bar">
        <button class="danger-outline-btn" onclick="confirmExit()">⬅ Menü</button>
    </div>

    <div class="card song-card">

        <div class="player-layer">

            <iframe id="player"></iframe>

<div class="vinyl-wrapper" onclick="startPlayback()">

    <div id="vinyl" class="disc spinning">
        <div class="disc-inner">▶</div>
    </div>

    <p class="vinyl-hint">
        Abspielen
    </p>

</div>

        <div class="song-info">
            <h2 id="title">🔒 Titel</h2>
            <h3 id="artist">🔒 Interpret</h3>
            <p id="year">🔒 Jahr</p>
        </div>

    </div>

    <div class="game-actions">
        <button class="primary-btn" onclick="reveal()">Lösen</button>
        <button class="secondary-btn" onclick="nextSong()">Nächste</button>
    </div>

    <div class="card points-box">

        <h3>Punkte buchen</h3>

        <div class="points-grid">

            <div class="point-card" data-points="4">Titel +4</div>
            <div class="point-card" data-points="2">Interpret +2</div>
            <div class="point-card" data-points="2">Jahr +2</div>

            <button class="success-btn" onclick="bookPoints()">Buchen</button>

        </div>

    </div>

    <div class="card scoreboard">
        <div id="scoreboard"></div>
    </div>

</div>

<!-- ================= DATABASE ================= -->

<div id="database" class="view">

    <div class="top-bar">
        <button class="danger-outline-btn" onclick="goMenu()">⬅ Menü</button>
    </div>

    <div class="card">

        <h2>🎵 Song Datenbank</h2>

        <input id="db-title" placeholder="Titel">
        <input id="db-artist" placeholder="Interpret">
        <input id="db-year" placeholder="Jahr">
        <input id="db-url" placeholder="Apple Music Link">

        <button class="primary-btn" onclick="saveSong()">Speichern</button>

    </div>

    <div class="card">

        <h3>📋 Songs</h3>
        <div id="song-list"></div>

    </div>

    <div class="card">

        <h3>📥 Externe Daten laden</h3>

        <textarea id="import-data" placeholder='[{"title":"...","artist":"...","year":"...","url":"..."}]'></textarea>

        <button class="secondary-btn" onclick="importSongs()">Importieren</button>

    </div>

</div>

<script>

/* ================= DATA ================= */

let songs = JSON.parse(localStorage.getItem("songs") || "[]");

let teams = ["Team 1", "Team 2"];
let scores = [0, 0];
let currentTeam = 0;

let currentSong = null;
let revealed = false;

/* ================= ELEMENTS ================= */

const player = document.getElementById("player");
const vinyl = document.getElementById("vinyl");

/* ================= HELPERS ================= */

function normalize(url){
    return url.replace("music.apple.com","embed.music.apple.com");
}

/* ================= NAVIGATION ================= */

function startGame(){
    switchView("game");
    nextSong();
}

function openDatabase(){
    switchView("database");
    renderSongs();
}

function goMenu(){
    switchView("menu");
}

function switchView(view){
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(view).classList.add("active");
}

/* ================= EXIT ================= */

function confirmExit(){
    if(confirm("Spiel wirklich verlassen? Fortschritt geht verloren.")){
        location.reload();
    }
}

/* ================= GAME ================= */

function nextSong(){

    if(!songs.length){
        alert("Keine Songs vorhanden!");
        return;
    }

    currentSong = songs[Math.floor(Math.random()*songs.length)];
    revealed = false;

    player.src = normalize(currentSong.url);
    player.style.opacity = "0";

    vinyl.style.display = "flex";
    vinyl.classList.add("spinning");

    document.getElementById("title").innerText = "🔒 Titel";
    document.getElementById("artist").innerText = "🔒 Interpret";
    document.getElementById("year").innerText = "🔒 Jahr";

    document.querySelectorAll(".point-card").forEach(el=>{
        el.classList.remove("selected");
    });
}

function reveal(){

    if(!currentSong || revealed) return;

    revealed = true;

    vinyl.style.display = "none";
    vinyl.classList.remove("spinning");

    player.style.opacity = "1";

    document.getElementById("title").innerText = currentSong.title;
    document.getElementById("artist").innerText = currentSong.artist;
    document.getElementById("year").innerText = currentSong.year;
}

/* ================= POINTS ================= */

document.querySelectorAll(".point-card").forEach(el=>{
    el.onclick = ()=> el.classList.toggle("selected");
});

function bookPoints(){

    if(!revealed) return;

    let pts = 0;

    document.querySelectorAll(".point-card.selected").forEach(el=>{
        pts += parseInt(el.dataset.points);
    });

    scores[currentTeam] += pts;

    currentTeam = (currentTeam + 1) % teams.length;

    updateScore();
}

/* ================= SCOREBOARD ================= */

function updateScore(){

    let html = "";

    teams.forEach((t,i)=>{

        html += `
        <div class="score-item ${i === currentTeam ? 'active-team' : ''}">
            <strong>${t}</strong>
            <span>${scores[i]}</span>

            <div class="score-bar">
                <div class="score-fill" style="width:${scores[i]*5}px"></div>
            </div>
        </div>
        `;
    });

    document.getElementById("scoreboard").innerHTML = html;
}

updateScore();

/* ================= DATABASE ================= */

let editIndex = null;

function saveSong(){

    let song = {
        title: document.getElementById("db-title").value,
        artist: document.getElementById("db-artist").value,
        year: document.getElementById("db-year").value,
        url: document.getElementById("db-url").value
    };

    if(editIndex !== null){
        songs[editIndex] = song;
        editIndex = null;
    } else {
        songs.push(song);
    }

    localStorage.setItem("songs", JSON.stringify(songs));

    clearForm();
    renderSongs();
}

function renderSongs(){

    let html = "";

    songs.forEach((s,i)=>{

        html += `
        <div class="card" style="margin-top:10px">
            <strong>${s.title}</strong><br>
            ${s.artist} (${s.year})

            <div style="margin-top:10px;">
                <button onclick="editSong(${i})">✏️</button>
                <button onclick="deleteSong(${i})">🗑️</button>
            </div>
        </div>
        `;
    });

    document.getElementById("song-list").innerHTML = html;
}

function editSong(i){
    let s = songs[i];

    document.getElementById("db-title").value = s.title;
    document.getElementById("db-artist").value = s.artist;
    document.getElementById("db-year").value = s.year;
    document.getElementById("db-url").value = s.url;

    editIndex = i;
}

function deleteSong(i){
    songs.splice(i,1);
    localStorage.setItem("songs", JSON.stringify(songs));
    renderSongs();
}

function clearForm(){
    document.getElementById("db-title").value = "";
    document.getElementById("db-artist").value = "";
    document.getElementById("db-year").value = "";
    document.getElementById("db-url").value = "";
}

function importSongs(){
    try{
        let data = JSON.parse(document.getElementById("import-data").value);
        songs = songs.concat(data);
        localStorage.setItem("songs", JSON.stringify(songs));
        renderSongs();
        alert("Import erfolgreich!");
    } catch(e){
        alert("Fehler im JSON!");
    }
}

</script>

</body>
</html>
