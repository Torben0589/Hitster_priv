<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Privat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="topbar">
        <div class="logo">
            🎵 Hitster Privat
        </div>

        <button class="settings-btn">
            ⚙️
        </button>
    </header>

    <div class="content">

        <!-- LINKE SEITE -->

        <div class="main-panel">

            <div class="song-card">

                <div class="card-header">
                    <span id="cardNumber">Karte #1</span>
                </div>

                <div class="vinyl-container">

                    <div class="vinyl">
                        <div class="vinyl-center">
                            ♪
                        </div>
                    </div>

                </div>

                <div id="songDisplay">

                    <h2>🎵 Unbekannter Song</h2>

                </div>

                <div class="actions">

                    <button id="playButton">
                        🎧 Song suchen
                    </button>

                    <button id="revealButton">
                        👀 Auflösen
                    </button>

                    <button id="nextButton">
                        ➡️ Nächste Karte
                    </button>

                </div>

            </div>

        </div>

        <!-- RECHTE SEITE -->

        <div class="side-panel">

            <div class="panel-box">

                <h3>Spielstand</h3>

                <div class="player-row">
                    <span>Spieler 1</span>

                    <span id="score1">0</span>

                    <button onclick="addPoint(1)">+</button>
                </div>

                <div class="player-row">
                    <span>Spieler 2</span>

                    <span id="score2">0</span>

                    <button onclick="addPoint(2)">+</button>
                </div>

            </div>

            <div class="panel-box">
                <h3>Einstellungen</h3>

                <p>
                    Apple Music Suche
                </p>

                <p>
                    Private Hitster Version
                </p>

            </div>

            <div class="panel-box">
                <h3>Hilfe</h3>

                <p>
                    Song suchen → Song hören →
                    Jahr erraten →
                    Auflösen.
                </p>
            </div>

        </div>

    </div>

</div>

<script.jsscript>

</body>
</html>
