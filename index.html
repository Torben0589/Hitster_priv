<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitster Party Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= MAIN MENU ================= -->

<div id="menu" class="view active main-menu">

    <h1>Hitster Party Game</h1>
    <p>Errate Titel, Interpret und Erscheinungsjahr</p>

    <button class="menu-button" onclick="startGame()">🎮 Neues Spiel</button>
    <button class="menu-button">💿 Datenbank</button>

</div>

<!-- ================= GAME ================= -->

<div id="game" class="view">

    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="danger-outline-btn" onclick="confirmExit()">⬅ Menü</button>
    </div>

    <!-- SONG CARD -->
    <div class="card song-card">

        <div class="player-layer">

            <iframe id="player"></iframe>

            <div id="vinyl" class="disc spinning">
                <div class="disc-inner">♪</div>
            </div>

        </div>

        <div class="song-info">
            <h2 id="title">🔒 Titel</h2>
            <h3 id="artist">🔒 Interpret</h3>
            <p id="year">🔒 Jahr</p>
        </div>

    </div>

    <!-- ACTIONS -->
    <div class="game-actions">

        <button class="primary-btn" onclick="reveal()">Lösen</button>
        <button class="secondary-btn" onclick="nextSong()">Nächste</button>

    </div>

    <!-- POINTS -->
    <div class="card points-box">

        <h3>Punkte buchen</h3>

        <div class="points-grid">

            <div class="point-card" data-points="4">Titel +4</div>
            <div class="point-card" data-points="2">Interpret +2</div>
            <div class="point-card" data-points="2">Jahr +2</div>

            <button class="success-btn" onclick="bookPoints()">Buchen</button>

        </div>

    </div>

    <!-- SCOREBOARD -->
    <div class="card scoreboard">

        <div id="scoreboard"></div>

    </div>

</div>

<script>

let songs = JSON.parse(localStorage.getItem("songs") || "[]");

let teams = ["Team 1", "Team 2"];
let scores = [0, 0];
let currentTeam = 0;

let currentSong = null;
let revealed = false;

/* ELEMENTE */
const player = document.getElementById("player");
const vinyl = document.getElementById("vinyl");

/* NORMALIZE */
function normalize(url){
    return url.replace("music.apple.com","embed.music.apple.com");
}

/* MENU */
function startGame(){
    document.getElementById("menu").classList.remove("active");
    document.getElementById("game").classList.add("active");
    nextSong();
}

/* EXIT */
function confirmExit(){
    if(confirm("Spiel wirklich verlassen? Fortschritt geht verloren.")){
        location.reload();
    }
}

/* SONG */
function nextSong(){

    if(!songs.length){
        alert("Keine Songs vorhanden!");
        return;
    }

    currentSong = songs[Math.floor(Math.random()*songs.length)];
    revealed = false;

    player.src = normalize(currentSong.url);
    player.style.opacity = "0";

    vinyl.style.display = "flex";
    vinyl.classList.add("spinning");

    document.getElementById("title").innerText = "🔒 Titel";
    document.getElementById("artist").innerText = "🔒 Interpret";
    document.getElementById("year").innerText = "🔒 Jahr";

    document.querySelectorAll(".point-card").forEach(el=>{
        el.classList.remove("selected");
    });
}

/* REVEAL */
function reveal(){

    if(!currentSong || revealed) return;

    revealed = true;

    vinyl.style.display = "none";
    vinyl.classList.remove("spinning");

    player.style.opacity = "1";

    document.getElementById("title").innerText = currentSong.title;
    document.getElementById("artist").innerText = currentSong.artist;
    document.getElementById("year").innerText = currentSong.year;
}

/* POINTS */
document.querySelectorAll(".point-card").forEach(el=>{
    el.onclick = ()=> el.classList.toggle("selected");
});

function bookPoints(){

    if(!revealed) return;

    let pts = 0;

    document.querySelectorAll(".point-card.selected").forEach(el=>{
        pts += parseInt(el.dataset.points);
    });

    scores[currentTeam] += pts;

    currentTeam = (currentTeam + 1) % teams.length;

    updateScore();
}

/* SCOREBOARD */
function updateScore(){

    let html = "";

    teams.forEach((t,i)=>{

        html += `
        <div class="score-item ${i === currentTeam ? 'active-team' : ''}">
            <strong>${t}</strong>
            <span>${scores[i]}</span>

            <div class="score-bar">
                <div class="score-fill" style="width:${scores[i]*5}px"></div>
            </div>
        </div>
        `;
    });

    document.getElementById("scoreboard").innerHTML = html;
}

updateScore();

</script>

</body>
</html>
