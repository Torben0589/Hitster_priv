<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Privat</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎵 Hitster Privat</h1>

        <div class="scoreboard">

            <div>
                Spieler 1:
                <span id="score1">0</span>
                <button onclick="addPoint(1)">+</button>
            </div>

            <div>
                Spieler 2:
                <span id="score2">0</span>
                <button onclick="addPoint(2)">+</button>
            </div>

        </div>

        <div class="card">

            <div id="cardNumber">
                Karte
            </div>

            <div id="songDisplay">
                🎵 Unbekannter Song
            </div>

            <div class="buttons">

                <button id="playButton">
                    🎧 Song suchen
                </button>

                <button id="revealButton">
                    👀 Auflösen
                </button>

                <button id="nextButton">
                    ➡️ Nächste Karte
                </button>

            </div>

        </div>

    </div>

    script.jsscript>

</body>
</html>
